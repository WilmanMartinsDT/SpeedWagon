<section class="page-hero">
  <div class="container">
    <h1 class="page-hero-title">Our Shop</h1>
    <p class="page-hero-subtitle">Exclusive ocean-inspired merchandise</p>
  </div>
</section>

<section class="shop-section">
  <div class="container py-5">

    <!-- FILTRO POR CATEGORÍA -->
    <div class="d-flex gap-2 flex-wrap mb-4">
      <button class="btn-filter active" (click)="filterBy('All')">All</button>
      <button class="btn-filter" (click)="filterBy('Clothing')">Clothing</button>
      <button class="btn-filter" (click)="filterBy('Decoration')">Decoration</button>
      <button class="btn-filter" (click)="filterBy('Accessories')">Accessories</button>
      <button class="btn-filter" (click)="filterBy('Stationery')">Stationery</button>
    </div>

    <!-- GRID DE PRODUCTOS -->
    <div class="row g-4">
      <div class="col-sm-6 col-lg-4" *ngFor="let product of products">
        <div class="product-card h-100">
          <img [src]="product.img" [alt]="product.name" class="product-img" />
          <div class="product-body">
            <span class="product-category">{{ product.category }}</span>
            <h5 class="product-name">{{ product.name }}</h5>
            <p class="product-desc">{{ product.description }}</p>
            <div class="d-flex justify-content-between align-items-center mt-3">
              <span class="product-price">{{ product.price | currency:'EUR' }}</span>
              <a [routerLink]="['/product', product.id]" class="btn-detail">View details</a>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
