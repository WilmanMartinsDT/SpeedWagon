<section class="hero text-center text-white d-flex align-items-center justify-content-center position-relative">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="assets/images/submarine_v1.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1 class="display-3 fw-bold fade-in">Journey Beyond Darkness</h1>
    <p class="lead fade-in delay-1">Explore the depths with Speed Wagon</p>
    <a routerLink="/layers" class="btn btn-outline-info btn-lg mt-3 fade-in delay-2">
      Explore now
    </a>
  </div>
</section>

<section class="container my-5">
  <h2 class="text-center text-info mb-4">Ocean Zones</h2>
  <div class="zones-grid">
    <div class="zone-wrapper" *ngFor="let zone of zones">
      <div class="ocean-card">
        <div class="card-body">
          <h5>{{ zone.name }}</h5>
          <p>{{ zone.desc }}</p>
          <a routerLink="/layers" class="ocean-btn">
            Learn More
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
