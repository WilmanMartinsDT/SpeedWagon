<section class="exosphere-section hero-bg position-relative">

  <div class="overlay"></div>

  <main class="pt-5 mt-5 py-5 text-light position-relative content">
    <div class="container py-4">
      
      <div class="row justify-content-center mb-4">
        <div class="col-lg-8 text-center">
          <p class="text-uppercase fs-4 text-info fw-semibold typing-effect">
            Contact Mission Control
          </p>
          <h2 class="h1 fw-bold mb-3">Get in touch with Speed Wagon</h2>
          <p>
            Send us your questions and our team will reach back.
          </p>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-8">

          <div class="card bg-dark text-light border-secondary">
            <div class="card-body p-4 p-md-5">

              <form (submit)="onSubmit($event)">

                <div class="row g-3">

                  <div class="col-md-6">
                    <label class="form-label">Full name</label>
                    <input type="text" class="form-control bg-black text-light border-secondary"
                           name="name" required>
                  </div>

                  <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control bg-black text-light border-secondary"
                           name="email" required>
                  </div>

                  <div class="col-md-6">
                    <label class="form-label">Inquiry</label>
                    <select class="form-select bg-black text-light border-secondary" name="topic" required>
                      <option value="">Select</option>
                      <option value="tourism">Space tourism</option>
                      <option value="education">Education</option>
                      <option value="research">Research</option>
                      <option value="media">Media</option>
                      <option value="other">Other</option>
                    </select>
                  </div>

                  <div class="col-md-6">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-control bg-black text-light border-secondary" name="date">
                  </div>

                  <div class="col-12">
                    <label class="form-label">Message</label>
                    <textarea class="form-control bg-black text-light border-secondary"
                              name="message" rows="4" required></textarea>
                  </div>

                  <div class="col-12">
                    <div class="form-check">
                      <input type="checkbox" class="form-check-input" name="newsletter">
                      <label class="form-check-label">
                        Keep me updated
                      </label>
                    </div>
                  </div>

                  <div class="col-12 d-grid d-sm-flex justify-content-sm-end">
                    <button type="submit" class="btn btn-primary btn-lg">
                      Send message
                    </button>
                  </div>

                </div>

              </form>

              <div class="mt-5">
                <div class="card bg-dark text-light border-secondary text-center">
                  <div class="card-body p-4">

                    <h5 class="text-info mb-3">What our travelers say</h5>

                    <div class="testimonial-box">
                      <p class="mb-3 fst-italic fade" [class.show]="fadeIn">
                        "{{ currentTestimonial.message }}"
                      </p>
                      <small class="text-light opacity-75 fade" [class.show]="fadeIn">
                        — {{ currentTestimonial.author }}
                      </small>
                    </div>

                  </div>
                </div>
              </div>

            </div>
          </div>

        </div>
      </div>

    </div>
  </main>
</section>
