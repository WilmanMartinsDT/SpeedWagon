<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-label="SpeedWagon favicon">
  <defs>
    <radialGradient id="glowSub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020c1b"/>
    </linearGradient>
    <filter id="cyanGlow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="url(#bgGrad)"/>

  <!-- Glow halo behind submarine -->
  <ellipse cx="16" cy="13" rx="9" ry="5" fill="url(#glowSub)"/>

  <!-- Submarine body -->
  <ellipse cx="16" cy="13" rx="8" ry="4.5" fill="#0d2137" stroke="#00d4ff" stroke-width="1" filter="url(#cyanGlow)"/>

  <!-- Conning tower -->
  <rect x="12" y="8.5" width="5" height="4" rx="1.5" fill="#0d2137" stroke="#00d4ff" stroke-width="1" filter="url(#cyanGlow)"/>

  <!-- Periscope -->
  <line x1="14" y1="8.5" x2="14" y2="6" stroke="#00d4ff" stroke-width="1" stroke-linecap="round"/>
  <line x1="14" y1="6" x2="17.5" y2="6" stroke="#00d4ff" stroke-width="1" stroke-linecap="round"/>

  <!-- Porthole glowing -->
  <circle cx="11" cy="13" r="1.8" fill="none" stroke="#00d4ff" stroke-width="0.9"/>
  <circle cx="11" cy="13" r="0.9" fill="#00d4ff" opacity="0.7"/>

  <!-- Propeller -->
  <line x1="24" y1="13" x2="26" y2="10.5" stroke="#00d4ff" stroke-width="1" stroke-linecap="round"/>
  <line x1="24" y1="13" x2="26" y2="15.5" stroke="#00d4ff" stroke-width="1" stroke-linecap="round"/>

  <!-- Bubbles -->
  <circle cx="22" cy="9" r="0.8" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.7"/>
  <circle cx="24" cy="6.5" r="0.55" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>
  <circle cx="20" cy="7.5" r="0.5" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>

  <!-- SW text -->
  <text x="16" y="26.5"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="7.5"
    font-weight="800"
    fill="#00d4ff"
    text-anchor="middle"
    letter-spacing="1.5"
    filter="url(#cyanGlow)">SW</text>

  <!-- Bottom subtle line -->
  <line x1="8" y1="28.5" x2="24" y2="28.5" stroke="#00d4ff" stroke-width="0.4" opacity="0.3"/>
</svg>